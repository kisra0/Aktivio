<style>
body {
  background: #375A9A;
  margin-top: 90px;
  color: white;
 
}

/* PAGE LAYOUT: BODY LEFT + DESCRIPTION RIGHT */
.main-area {

}

    transition: opacity 0.3s ease, transform 0.2s ease;

    transition: 0.2s;
    width: 40%;

.main-btn:hover{
