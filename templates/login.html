<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login</title>
  <link rel="stylesheet"  href="{{ url_for('static', filename='css/css.css') }}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  
</head>
<body>
  <button class="exit-button" onclick="window.location.href='home'" title="Go tp Home">
  <i class="fas fa-times"></i>
</button>

<div id="overlay" class="overlay">
  <div class="icon-box">
    ✅
  </div>
</div>

<div class="container">
  <div class="form-card">
    <h2>🗓 Login</h2>

    <form id="eventForm" method="post" action="login_process">
    
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required>
      </div>

      

      <input type="submit" value="✅ Login" class="submit-btn">
    
    </form>
    {%if message%}
            <div id="outputSummary" class="output">Fill out the form and submit to login. If you have not an account please <a href="/register">Register</a></div>
            <div id="outputSummary" class="output" style="color:red">{{message}}</div>

    {%else%}
        <div id="outputSummary" class="output">Fill out the form and submit to login. If you have not an account please <a href="/register">Register</a></div>

    {%endif%}
  </div>
</div>
<script src="{{ url_for('static', filename='js/js.js') }}"></script>

</body>
</html>
