<!-- FullCalendar JS -->
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>

<script>
  document.addEventListener('DOMContentLoaded', function () {
    const calendarEl = document.getElementById('calendar');

    let selectedCell = null; // Track currently selected cell

    const calendar = new FullCalendar.Calendar(calendarEl, {
      initialView: 'dayGridMonth',
      headerToolbar: {
  left: 'prev,next today',
  center: 'title',
  right: ''
},
      selectable: true,

  dateClick: function(info) {
  // Remove previous selection
  if (selectedCell) {
    selectedCell.classList.remove('selected-day');
  }

  // Add highlight to the clicked cell
  selectedCell = info.dayEl;
  selectedCell.classList.add('selected-day');

  // Format the date nicely
 const year = info.date.getFullYear();
  const month = String(info.date.getMonth() + 1).padStart(2, '0'); // Month is 0-based
  const day = String(info.date.getDate()).padStart(2, '0');

  const formatted = `${year}-${month}-${day}`;

  // Show the alert
       window.location.href = "/date_selected_events?date=" + formatted; 

}
    });

    calendar.render();
  });
function go_to_add_event(){
     window.location.href = "/event_form"; 
}
</script>
