<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Workouts</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

  <link rel="stylesheet" href="{{ url_for('static', filename='css/css.css') }}">

<style>
/* ---------- PAGE BACKGROUND ---------- */
body {
  min-height: 100vh;
  background: linear-gradient(
    to bottom,
    #ce2fe0 0%,
    #d060bd 5%,
    #fac5fb 10%,
    #f4e9f4 25%,
    #ffffff 100%
  );
}

/* ---------- NAVBAR ---------- */
.navbar {
  background-color: rgba(0,0,0,0.3);
}
.navbar-dark .nav-link {
  color: white !important;
  opacity: 0.7;
  transition: opacity 0.3s ease, transform 0.2s ease;
}
.navbar-dark .nav-link:hover {
  opacity: 1;
  transform: scale(1.05);
  font-weight: 600;
}
.navbar-nav .nav-item {
  margin: 0 15px;
}

/* ---------- PAGE CONTAINER ---------- */
.articles-container {
  padding-top: 120px;
  padding-bottom: 40px;
  min-height: 100vh;
}

/* ---------- SEARCH ---------- */




/* ---------- TITLE ---------- */
.page-title {
  font-size: 2.4rem;
  font-weight: 700;
  text-align: center;
  margin-bottom: 30px;
  color: #2d2d2d;
}

/* ---------- GRID (LOCKED – SAME ALWAYS) ---------- */
/* ---------- GRID (FIXED CARD SIZE ALWAYS) ---------- */
.article-grid {
  display: grid;
  grid-template-columns: repeat(3, 360px); /* FIXED CARD WIDTH */
  grid-auto-rows: 260px;
  gap: 20px;
  padding: 0 40px;
  justify-content: center;  /* CENTER GRID WHEN FEW CARDS */
}


/* ---------- CARD ---------- */
.article-grid .card {
  height: 100%;
  border-radius: 18px;
  padding: 25px;
  cursor: pointer;

  display: flex;
  justify-content: flex-start;
  align-items: flex-start;
  text-align: left;

  box-shadow: 0 10px 25px rgba(0,0,0,0.15);
  transition: transform 0.25s ease, box-shadow 0.25s ease;
}

.article-grid .card:hover {
  transform: translateY(-6px) scale(1.02);
  box-shadow: 0 15px 35px rgba(0,0,0,0.25);
}

/* ---------- CARD TEXT ---------- */
.article-grid .card h5 {
  font-size: 1.35rem;
  font-weight: 700;
  margin: 0;
  line-height: 1.4;
}

/* ---------- RESPONSIVE ---------- */
@media (max-width: 992px) {
  .article-grid {
    grid-template-columns: repeat(2, 1fr);
  }
}

@media (max-width: 576px) {
  .article-grid {
    grid-template-columns: 1fr;
  }
}
.article-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
  padding: 20px 40px;
}
/* FILTER PANEL */
.filter-panel {
  position: fixed;
  top: 0;
  right: -350px;
  width: 320px;
  height: 100vh;
  background: white;
  box-shadow: -5px 0 20px rgba(0,0,0,0.2);
  padding: 20px;
  transition: right 0.3s ease;
  z-index: 2000;
}

.filter-panel.active {
  right: 0;
}

.filter-header {
  display: flex;
  justify-content: space-between;
  font-weight: 600;
  font-size: 18px;
}

.close-btn {
  border: none;
  background: none;
  font-weight: bold;
  font-size: 18px;
  color: #ce2fe0;   /* visible purple */
  cursor: pointer;
}

.close-btn:hover {
  background-color: #d2ccd3;
}


.filter-group {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}

.filter-btn {
  padding: 8px 12px;
  border-radius: 10px;
  border: 1px solid #ccc;
  background: white;
  transition: 0.2s;
}

.filter-btn.active {
  background: #ce2fe0;
  color: white;
  border-color: #ce2fe0;
}


.search-row {
  display: flex;
  gap: 12px;
  padding: 0 40px 30px;
  align-items: center;
  
}

/* Search input */
.search-row input[type="text"] {
  flex: 1;
  height: 44px;                 /* bigger */
  padding: 10px 16px;
  border-radius: 12px;
  border: none;
  font-size: 14px;
}

/* Search button */
.search-row .submit-btn {
  width: 100px;
  height: 44px;                 /* same height */
  border-radius: 12px;
  border: none;
  font-size: 14px;
  background:#2563eb;
}
.submit-btn:hover{
    background: #1d4ed8;

}
.filter-icon-btn {
  width: 44px;
  height: 44px;                 /* EXACT same size */
  border-radius: 12px;
  border: none;
  background: #2563eb;;            /* always white */
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 18px;
  color: rgb(255, 253, 253);
  margin-top:1px !important;
}

/* remove hover color change */
.filter-icon-btn:hover {
  background: #1d4ed8;
  color: black;
}
.filter-panel {
  color: black;   /* force text black */
}

.filter-panel h6,
.filter-panel span {
  color: black;
}

.filter-btn {
  color: black;   /* default text black */
}
.image-header {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  background: rgba(0,0,0,0.45);   /* opacity bar */
  color: white;
  padding: 6px 10px;
  display: flex;
  align-items: center;
  font-size: 0.85rem;            /* smaller font */
  font-weight: 500;
}
.apply-filter-btn {
  width: 100%;
  padding: 10px;
  border-radius: 10px;
  border: none;
  background: #28a745;   /* green */
  color: white;
  font-weight: 600;
  transition: 0.2s;
}

.apply-filter-btn:hover {
  background: #218838;
}

.header-icon {
  width: 18px;      /* adjust size */
  height: 18px;
  margin-right: 6px;
  object-fit: contain;
}
/* MAIN GRAY BUTTONS */
.main-btn {
  width: 30%;
  padding: 12px 0;
  border-radius: 14px;
  border: none;
  background: rgba(120,120,120,0.6);
  color: white;
  font-weight: 600;
  transition: 0.3s;
}

.main-btn:hover {
  background: rgba(90,90,90,0.8);
  transform: translateY(-2px);
}

/* ADD TO CALENDAR BUTTON */
.calendar-btn {
  padding: 10px 22px;
  border-radius: 12px;
  border: none;
  background: linear-gradient(45deg,#6a11cb,#2575fc);
  color: white;
  font-weight: 600;
  box-shadow: 0 6px 15px rgba(0,0,0,0.25);
  transition: 0.3s;
}

.calendar-btn:hover {
  transform: translateY(-2px);
}

/* START NOW BUTTON */
.start-btn {
  padding: 10px 22px;
  border-radius: 12px;
  border: none;
  background: #28a745;
  color: white;
  font-weight: 600;
  box-shadow: 0 6px 15px rgba(0,0,0,0.25);
  transition: 0.3s;
}

.start-btn:hover {
  background: #218838;
  transform: translateY(-2px);
}
</style>
</head>

<body>

<!-- ================= NAVBAR ================= -->
<nav class="navbar navbar-expand-lg navbar-dark fixed-top">
  <div class="container-fluid">
    <a class="navbar-brand d-flex align-items-center" href="home">
      <img src="{{url_for('static', filename='images/logo.png')}}" width="30" height="30" class="me-2">
      Aktivio
    </a>

    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav mx-auto">
        <li class="nav-item"><a class="nav-link" href="event_form">Add Event</a></li>
        <li class="nav-item"><a class="nav-link" href="event_calender">Calendar</a></li>
        <li class="nav-item"><a class="nav-link" href="workouts">Workouts</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Recommendations</a></li>
        <li class="nav-item"><a class="nav-link" href="test_your_self">Tests</a></li>
        <li class="nav-item"><a class="nav-link" href="body_members">Human model</a></li>
        <li class="nav-item"><a class="nav-link" href="articles">Articles</a></li>
        <li class="nav-item"><a class="nav-link" href="profile">My Profile</a></li>
      </ul>

      <div class="d-flex align-items-center">
        <a href="logout" class="btn btn-light me-2">Logout</a>
        {% if not session['img'] %}
        <img src="https://th.bing.com/th/id/OIP.2fjfpvyy6AslG7GH5mipHgHaHa"
             width="30" height="30" class="rounded-circle">
        {% else %}
        <img src="{{url_for('static',filename=session['img'])}}"
             width="30" height="30" class="rounded-circle">
        {% endif %}
      </div>
    </div>
  </div>
</nav>

<div class="articles-container text-center">

  <!-- TITLE -->
  <h2 class="page-title">Strength Trainings</h2>

  <!-- 3 BUTTONS -->
  <div class="d-flex justify-content-center mt-4">
    <div style="width:80%; display:flex; justify-content:space-between;">
      
      <button class="main-btn">Time: 40m</button>
      <button class="main-btn">Kcal: 405</button>
      <button class="main-btn">Difficulty: advanced</button>

    </div>
  </div>

  <!-- IMAGE -->
  <div class="d-flex justify-content-center mt-4">
    <img src="{{ url_for('static', filename='images/workout1.png') }}"
         style="width:80%; border-radius:18px; box-shadow:0 10px 30px rgba(0,0,0,0.2);">
  </div>

  <!-- ACTION BUTTONS -->
  <div class="d-flex justify-content-end mt-4">
    <div style="width:80%; display:flex; justify-content:flex-end; gap:15px;margin-right: 10% !important;">
      
      <button class="calendar-btn">Add to Calendar</button>
      <button class="start-btn">Start Now</button>

    </div>
  </div>

</div>

<!-- FILTER PANEL -->
<div id="filterPanel" class="filter-panel">
  <div class="filter-header">
    <span>Filters</span>
    <button onclick="toggleFilter()" class="close-btn">X</button>
  </div>

  <hr>

  <h6>Difficulty</h6>
  <div class="filter-group">
    <button class="filter-btn" onclick="toggleActive(this)">Easy</button>
    <button class="filter-btn" onclick="toggleActive(this)">Medium</button>
    <button class="filter-btn" onclick="toggleActive(this)">Hard</button>
  </div>

  <h6 class="mt-3">Category</h6>
  <div class="filter-group">
    <button class="filter-btn" onclick="toggleActive(this)">Aerobic training (Cardio)</button>
    <button class="filter-btn" onclick="toggleActive(this)">Anaerobic training (Strength workouts)</button>
    <button class="filter-btn" onclick="toggleActive(this)">Flexibility trainings</button>
    <button class="filter-btn" onclick="toggleActive(this)">Balance training</button>
  </div>
  <div class="mt-4">
  <button class="apply-filter-btn" onclick="applyFilter()">
    Apply Filter
  </button>
</div>

</div>
<script>
function toggleFilter() {
  document.getElementById("filterPanel").classList.toggle("active");
}
let selectedCategories = [];
function toggleActive(btn) {
  btn.classList.toggle("active");
  let text = btn.textContent.trim();
   if (selectedCategories.includes(text)) {
        selectedCategories = selectedCategories.filter(item => item !== text);
    } else {
        selectedCategories.push(text);
    }

}

function applyFilter(){
  let filters = selectedCategories.join(",");

  window.location.href="workout_filter?filter="+filters;
}


</script>

</body>
</html>
