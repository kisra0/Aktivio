<nav class="navbar navbar-expand-lg navbar-dark bg-primary fixed-top">
  <div class="container-fluid">
     <a class="navbar-brand d-flex align-items-center" href="#">
      <img src="{{url_for('static', filename='body.png')}}" alt="Logo" width="30" height="30" class="me-2">
      Activio
    </a>
     <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav mx-auto">
  <li class="nav-item">

  <li class="nav-item">

  <li class="nav-item">

  </li>
  <li class="nav-item">
    <a class="nav-link text-white" href="profile">My Profile</a>
  </li>
</ul>

    <div class="d-flex align-items-center">
      {%if message%}
      <a href="logout" class="btn btn-light me-2" data-bs-toggle="modal" style="visibility: hidden !important;">Logout</a>
      <a href="logout" class="btn btn-light me-2" data-bs-toggle="modal">Logout</a>
      <div class="d-flex align-items-center text-white">
          <span class="me-2">Hi, {{ session['name'] }}</span>
          {% if not session['img'] %}
          <img src="https://th.bing.com/th/id/OIP.2fjfpvyy6AslG7GH5mipHgHaHa?o=7rm=3&rs=1&pid=ImgDetMain&o=7&rm=3" alt="Profile" width="30" height="30" class="rounded-circle">

          {%else%}
                    <img src="{{url_for('static',filename=session['img'])}}" alt="Profile" width="30" height="30" class="rounded-circle">

          {%endif%}
        </div>
      
      {%else%}
      <a href="login" class="btn btn-light me-2" data-bs-toggle="modal">Login</a>
      <a href="register" class="btn btn-outline-light" data-bs-toggle="modal">Register</a>
      {%endif%}
      
    </div>
  </div>
  </div>
</nav>
